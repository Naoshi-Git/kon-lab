<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIFF Annotator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.min.js"></script>
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>TIFF Annotator</h2>
            </div>
            
            <div class="panel">
                <h3>Dev Mode</h3>
                <div class="control-group checkbox-group">
                    <input type="checkbox" id="opt-multi-mode">
                    <label for="opt-multi-mode">Multi-Image Mode (Dev)</label>
                </div>
            </div>

            <div class="panel" id="loaded-images-panel" style="display: none;">
                <h3>Loaded Images (<span id="image-count">0</span>)</h3>
                <div id="file-list-container" style="max-height: 150px; overflow-y: auto;">
                    <!-- Dynamic File List -->
                </div>
            </div>
            
            <div class="panel">
                <h3>Image Input</h3>
                <div id="drop-zone">
                    <p>Drag & Drop image(s) here<br>or click to select</p>
                    <input type="file" id="file-input" accept=".tif,.tiff,.jpg,.jpeg,.png" multiple>
                </div>
            </div>

            <div class="panel">
                <h3>Annotations Settings</h3>
                <div class="control-group">
                    <label>Circle Radius (<span id="radius-val">10</span>px)</label>
                    <input type="range" id="radius-slider" min="2" max="100" value="10">
                </div>

                <div class="control-group">
                    <label>Line Thickness (<span id="thickness-val">2</span>px)</label>
                    <input type="range" id="thickness-slider" min="1" max="20" value="2">
                </div>

                <div class="control-group">
                    <label>Text Size (<span id="textsize-val">16</span>px)</label>
                    <input type="range" id="textsize-slider" min="10" max="60" value="16">
                </div>
                <div class="control-group checkbox-group">
                    <input type="checkbox" id="opt-show-labels" checked>
                    <label for="opt-show-labels">Show count labels on circles</label>
                </div>
            </div>

            <div class="panel">
                <h3>Tools / Statistics</h3>
                <div id="stats-container">
                    <!-- Dynamic Rows -->
                </div>
                <div class="add-color-container">
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="color" id="new-color-picker" value="#ff00ff" style="width: 36px; height: 36px; border: none; padding: 0; background: none; cursor: pointer; flex-shrink: 0;">
                        <input type="text" id="new-color-hex" value="#ff00ff" style="flex: 1; background: #1a1a1a; color: white; border: 1px solid #444; padding: 6px 8px; border-radius: 4px; font-family: monospace; font-size: 0.85rem; min-width: 0;">
                        <button id="confirm-add-color-btn" class="primary-btn" style="width: auto; padding: 6px 12px; font-size: 0.85rem; margin-top: 0;">Add</button>
                    </div>
                </div>
                
                <div id="multi-stats-table-container" style="margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 15px; display: none;">
                    <h3 style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; color: #999;">File Breakdown</h3>
                    <div style="overflow-x: auto; background: #1a1a1a; border-radius: 4px; padding: 5px;">
                        <table id="stats-table" style="width: 100%; border-collapse: collapse; font-size: 0.75rem; text-align: left;">
                            <thead>
                                <!-- Dynamic Header -->
                            </thead>
                            <tbody>
                                <!-- Dynamic Body -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="panel actions">
                <div class="control-group checkbox-group">
                    <input type="checkbox" id="opt-log">
                    <label for="opt-log">Export Stats Log (.txt)</label>
                </div>
                <div class="control-group checkbox-group">
                    <input type="checkbox" id="opt-summary">
                    <label for="opt-summary">Overlay Summary on Image</label>
                </div>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <button id="export-btn" class="primary-btn">Export JPEG</button>
                    <button id="export-all-btn" class="primary-btn" style="background-color: #4a4a4a; display: none;">Export All JPEGs</button>
                    <button id="export-csv-btn" class="primary-btn" style="background-color: #2b7a78;">Export CSV</button>
                </div>
            </div>
            
            <div class="instructions">
                <div class="instruction-title">Controls</div>
                <div class="instruction-item">
                    <span class="key-combo"><kbd>Left Click</kbd></span>
                    <span class="instruction-desc">Add / Replace Color</span>
                </div>
                <div class="instruction-item">
                    <span class="key-combo"><kbd>Left Drag</kbd></span>
                    <span class="instruction-desc">Move Circle</span>
                </div>
                <div class="instruction-item">
                    <span class="key-combo"><kbd>Right Click</kbd></span>
                    <span class="instruction-desc">Delete Nearest</span>
                </div>
                <div class="instruction-item">
                    <span class="key-combo"><kbd>Shift</kbd>+<kbd>Wheel</kbd></span>
                    <span class="instruction-desc">Zoom</span>
                </div>
                <div class="instruction-item">
                    <span class="key-combo"><kbd>Mid Drag</kbd> / <kbd>Shift</kbd>+<kbd>Drag</kbd></span>
                    <span class="instruction-desc">Pan Image</span>
                </div>
            </div>
        </aside>

        <main id="main-view">
            <div id="canvas-container">
                <canvas id="main-canvas"></canvas>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
